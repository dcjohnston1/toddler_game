<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playable Grid Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="splash-overlay" id="splashOverlay">
        <div class="splash-dialog">
            <div class="splash-title">Toddler</div>
            <div class="splash-subtitle">vs. The Tetromino</div>
            <button class="splash-btn" onclick="document.getElementById('splashOverlay').style.display='none'; document.getElementById('modeOverlay').style.display='flex';">Play</button>
        </div>
    </div>

    <div class="mode-overlay" id="modeOverlay" style="display:none;">
        <div class="mode-dialog">
            <h2>Choose Mode</h2>
            <button class="mode-btn" onclick="startGame('freeplay')">Free Play</button>
            <button class="mode-btn map-btn" onclick="startGame('map')">Map Mode</button>
        </div>
    </div>

    <div class="game-container">
        <div class="game-status" id="gameStatus"></div>

        <div class="grid-container" id="gridContainer">
            <!-- Grid cells will be generated by JavaScript -->
        </div>
        <canvas id="minimap" style="display:none;"></canvas>

        <div class="bottom-bar">
            <div class="trackpad" id="trackpad">
                <div class="trackpad-dot" id="trackpadDot"></div>
            </div>

            <div class="bottom-right">
                <button class="new-game-btn" onclick="showModeSelector()">New Game</button>
                <button class="settings-btn" onclick="toggleSettings()">&#9881; Settings</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="population-slider">
                <div class="slider-label">Cell Population: <span id="populationValue">5</span>%</div>
                <input type="range" min="1" max="20" value="5" class="slider" id="populationSlider">
            </div>
            <div class="field-slider">
                <div class="slider-label">Field Strength: <span id="fieldValue">0.5</span></div>
                <input type="range" min="0" max="2" step="0.1" value="0.5" class="slider" id="fieldSlider">
            </div>
            <div class="lock-slider">
                <div class="slider-label">Movement Lock: <span id="lockValue">2</span> cells</div>
                <input type="range" min="1" max="3" value="2" class="slider" id="lockSlider">
            </div>
            <div class="distance-slider">
                <div class="slider-label">Start Distance: <span id="distanceValue">10</span></div>
                <input type="range" min="1" max="25" value="10" class="slider" id="distanceSlider">
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
